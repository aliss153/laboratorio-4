<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Tareas — Lab IV</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    input { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 4px; width: 180px; }
    button { padding: 8px 14px; margin: 4px; border: none; border-radius: 4px; cursor: pointer; color: white; }
    .btn-crear  { background: #4CAF50; }
    .btn-cargar { background: #2196F3; }
    .btn-editar   { background: #FF9800; font-size: 12px; padding: 4px 8px; }
    .btn-eliminar { background: #f44336; font-size: 12px; padding: 4px 8px; }
    .tarea { background: #f9f9f9; padding: 10px; margin: 6px 0; border-radius: 6px; border-left: 4px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; }
    #log { background: #222; color: #aaffaa; padding: 10px; border-radius: 6px; font-size: 12px; margin-top: 10px; min-height: 40px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>📋 Gestión de Tareas — Lab IV</h1>
  <input id="titulo" placeholder="Título">
  <input id="descripcion" placeholder="Descripción">
  <button class="btn-crear" onclick="crearTarea()">➕ Crear</button>
  <button class="btn-cargar" onclick="cargarTareas()">🔄 Cargar</button>
  <div id="lista"></div>
  <div id="log">Esperando acciones...</div>

  <script>
   const BASE = "https://laboratorio-4-eight.vercel.app/api";

    function log(msg) {
      document.getElementById("log").innerText = msg;
    }

    async function crearTarea() {
      const titulo = document.getElementById("titulo").value;
      const descripcion = document.getElementById("descripcion").value;
      if (!titulo || !descripcion) { alert("Completa los campos"); return; }
      const res = await fetch(BASE + "/tareas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({titulo, descripcion})
      });
      const data = await res.json();
      log("POST → " + JSON.stringify(data));
      document.getElementById("titulo").value = "";
      document.getElementById("descripcion").value = "";
      cargarTareas();
    }

    async function cargarTareas() {
      const res = await fetch(BASE + "/tareas");
      const tareas = await res.json();
      log("GET /tareas → " + JSON.stringify(tareas));
      const lista = document.getElementById("lista");
      if (tareas.length === 0) { lista.innerHTML = "<p>No hay tareas aún</p>"; return; }
      lista.innerHTML = tareas.map(t => `
        <div class="tarea">
          <div>
            <b>#${t.id} — ${t.titulo}</b><br>
            ${t.descripcion}
            <small> | Completada: ${t.completada ? "✅" : "❌"}</small>
          </div>
          <div>
            <button class="btn-editar" onclick="editarTarea(${t.id},'${t.titulo}','${t.descripcion}',${t.completada})">✏️</button>
            <button class="btn-eliminar" onclick="eliminarTarea(${t.id})">🗑️</button>
          </div>
        </div>`).join("");
    }

    async function editarTarea(id, titulo, descripcion, completada) {
      const nuevoTitulo = prompt("Nuevo título:", titulo);
      if (!nuevoTitulo) return;
      const nuevaDesc = prompt("Nueva descripción:", descripcion);
      if (!nuevaDesc) return;
      const res = await fetch(BASE + "/tareas/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({titulo: nuevoTitulo, descripcion: nuevaDesc, completada: !completada})
      });
      const data = await res.json();
      log("PUT → " + JSON.stringify(data));
      cargarTareas();
    }

    async function eliminarTarea(id) {
      if (!confirm("¿Eliminar tarea #" + id + "?")) return;
      const res = await fetch(BASE + "/tareas/" + id, { method: "DELETE" });
      const data = await res.json();
      log("DELETE → " + JSON.stringify(data));
      cargarTareas();
    }
  </script>
</body>
</html>[
